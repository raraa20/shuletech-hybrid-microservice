version: '3.8'

services:
  local_mysql_db:
    image: mysql:8.0
    container_name: zanzibar_academy_offline_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: zanzibar_academy_2026
      MYSQL_DATABASE: Zanzibar_academy
      MYSQL_USER: Zanzibar_academy
      MYSQL_PASSWORD: zanzibar_academy_2026
    ports:
      - "3306:3306"
    volumes:
      - mysql_local_data:/var/lib/mysql

  fastapi_core_app:
    build: .
    container_name: school_core_backend
    ports:
      - "8000:8000"
    depends_on:
      - local_mysql_db
