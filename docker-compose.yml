      - SUPABASE_URL=https://nubogicwfjvgcenmpopn.supabase.co/rest/v1/
      - SUPABASE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51Ym9naWN3Zmp2Z2Nlbm1wb3BuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0ODg5MTUsImV4cCI6MjA5ODA2NDkxNX0.pj8-OQmb_SW0WE1V9LinjdhtBGpIDaWVsovwlJ2VdHE
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

